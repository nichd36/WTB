repos:
  # Run Ruff Format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.13
    hooks:
      # Run the linter.
      - id: ruff-check
        types: [ python ]
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
        types: [ python ]
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"]
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        exclude: testing
        language_version: python3.14
        args: [--py314-plus]